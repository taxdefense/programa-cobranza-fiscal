/* Wiring (Claude Code): crea la orden de pago en el backend (nunca en el navegador, ya que
   requiere la API key secreta de Flow) y redirige a la payment_url que retorna Flow. */
async function handleEnrollmentSubmit(e){
  e.preventDefault();
  const form = e.currentTarget;
  const btn = document.getElementById('flow-checkout-btn');
  const nombre = form.nombre.value.trim();
  const email = form.email.value.trim();
  const telefono = form.telefono.value.trim();
  if(!nombre || !email || !form.acepta.checked) return;
  const original = btn.textContent;
  btn.disabled = true; btn.textContent = 'Redirigiendo a pago…';
  try{
    const r = await fetch('/api/flow/create-payment', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({nombre, email, telefono}),
    });
    const data = await r.json();
    if(!r.ok || !data.url) throw new Error(data && data.error || 'flow_error');
    window.location.href = data.url;
  }catch(err){
    btn.disabled = false; btn.textContent = original;
    alert('No pudimos iniciar el pago. Intenta nuevamente o escríbenos por WhatsApp.');
  }
}

function CountStat({ to, suffix = '', label, prefix = '+' }) {
  const ref = React.useRef(null);
  const [n, setN] = React.useState(0);
  React.useEffect(() => {
    const el = ref.current;
    let done = false;
    const animate = () => {
      if (done) return;
      done = true;
      const start = performance.now(), dur = 1400;
      const tick = (now) => {
        const p = Math.min(1, (now - start) / dur);
        setN(Math.round((1 - Math.pow(1 - p, 3)) * to));
        if (p < 1) requestAnimationFrame(tick);
      };
      requestAnimationFrame(tick);
    };
    const r = el && el.getBoundingClientRect();
    if (r && r.top < window.innerHeight && r.bottom > 0) { animate(); return; }
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => { if (e.isIntersecting) { animate(); io.disconnect(); } });
    }, { threshold: 0.05 });
    if (el) io.observe(el);
    return () => io.disconnect();
  }, [to]);
  return (<div ref={ref} style={{ borderLeft: '3px solid var(--brand-soft)', paddingLeft: 16 }}>
    <b style={{ display: 'block', fontSize: '1.9rem', fontWeight: 900, color: 'var(--brand)' }}>{prefix}{n}{suffix}</b>
    <span style={{ fontSize: '.85rem', color: 'var(--ink-soft)' }}>{label}</span>
  </div>);
}

}
